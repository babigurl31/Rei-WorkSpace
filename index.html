<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.Nghi Workspace 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS: TONE HỒNG - TRẮNG - ĐEN */
        :root {
            --bg-main: #fce4ec; /* Hồng nhạt nền */
            --bg-card: #ffffff; /* Trắng cho các khối */
            --text-main: #000000; /* Chữ đen */
            --text-muted: #666666;
            --accent: #ec407a; /* Hồng đậm nhấn */
            --border: #f8bbd0;
            --red: #ff5f5f;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Syne', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); font-size: 28px; }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        /* THANH ĐIỀU HƯỚNG TABS */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--bg-card); border: 2px solid var(--border); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px rgba(236, 64, 122, 0.3); }

        /* KHUNG CHỨA NỘI DUNG */
        .tab-content { display: none; background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TÍNH NĂNG 1: CALENDAR (THÁNG) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-header { font-weight: bold; color: var(--accent); padding: 10px 0; border-bottom: 2px solid var(--border); }
        .cal-day { padding: 15px 5px; border: 1px solid #f0f0f0; border-radius: 8px; min-height: 80px; display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { border-color: var(--accent); background: #fffafc; }
        .day-num { font-weight: bold; margin-bottom: 5px; align-self: center;}
        
        /* Đánh dấu ngày quan trọng */
        .event-tag { font-size: 10px; background: var(--bg-main); color: var(--accent); padding: 2px 6px; border-radius: 4px; border-left: 3px solid var(--accent); margin-bottom: 3px; text-align: left; width: 100%;}
        .event-deadline { border-left-color: var(--red); color: var(--red); background: #ffebee;}

        /* TÍNH NĂNG 2: WEEKLY PLANNER */
        .weekly-grid { display: grid; grid-template-columns: 80px repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .wk-header, .wk-time, .wk-cell { background: #fff; padding: 10px; }
        .wk-header { text-align: center; font-weight: bold; color: var(--accent); background: var(--bg-main); }
        .wk-time { font-weight: bold; display: flex; align-items: center; justify-content: center; background: var(--bg-main); color: var(--accent); }
        .wk-cell { min-height: 120px; display: flex; flex-direction: column; gap: 5px; }
        
        .task-card { font-size: 11px; padding: 6px; border-radius: 4px; display: flex; gap: 5px; background: #fafafa; border: 1px solid #eee; border-left: 3px solid var(--accent); }
        .task-card input[type="checkbox"] { accent-color: var(--accent); }
        .task-card.done { opacity: 0.5; text-decoration: line-through; border-left-color: #ccc; }

        @media (max-width: 768px) {
            .weekly-grid { grid-template-columns: 1fr; }
            .wk-header, .wk-time { display: none; }
            .wk-cell { border: 1px solid var(--border); margin-bottom: 10px; border-radius: 8px; position: relative; padding-top: 30px; }
            .wk-cell::before { content: attr(data-label); position: absolute; top: 0; left: 0; right: 0; background: var(--bg-main); padding: 5px 10px; font-weight: bold; color: var(--accent); border-radius: 8px 8px 0 0; font-size: 12px;}
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌸 Workspace Của Tớ</h1>
        <p>Quản lý thời gian • Kế hoạch cá nhân • Hoàn thành mục tiêu</p>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('monthly')">Lịch Tháng</button>
        <button class="tab-btn" onclick="switchTab('weekly')">Kế Hoạch Tuần</button>
        <button class="tab-btn" onclick="switchTab('daily')">Việc Hôm Nay</button>
    </div>

    <div id="monthly" class="tab-content active">
        <h2 style="margin-bottom: 15px; color: var(--accent);">Tháng 4 / 2026</h2>
        <div class="calendar-grid">
            <div class="cal-header">T2</div><div class="cal-header">T3</div><div class="cal-header">T4</div>
            <div class="cal-header">T5</div><div class="cal-header">T6</div><div class="cal-header">T7</div><div class="cal-header">CN</div>
            
            <script>
                // Demo vẽ nhanh lịch tháng
                const calGrid = document.querySelector('.calendar-grid');
                for (let i = 1; i <= 30; i++) {
                    let events = '';
                    if (i === 15) events = '<div class="event-tag">Làm hoa ruy băng</div>';
                    if (i === 20) events = '<div class="event-tag">Nấu bồ kết</div>';
                    if (i === 26) events = '<div class="event-tag event-deadline">Nộp báo cáo thực tập</div>';
                    if (i === 28) events = '<div class="event-tag">Tặng quà Trâm Mei</div>';
                    
                    calGrid.innerHTML += `
                        <div class="cal-day">
                            <div class="day-num">${i}</div>
                            ${events}
                        </div>
                    `;
                }
            </script>
        </div>
    </div>

    <div id="weekly" class="tab-content">
        <div class="weekly-grid" id="week-grid">
            <div class="wk-header"></div>
            <div class="wk-header">Thứ 2</div><div class="wk-header">Thứ 3</div><div class="wk-header">Thứ 4</div>
            <div class="wk-header">Thứ 5</div><div class="wk-header">Thứ 6</div><div class="wk-header">Thứ 7</div><div class="wk-header">CN</div>

            <div class="wk-time">Sáng</div>
            <div class="wk-cell" data-label="Thứ 2 - Sáng">
                <div class="task-card"><input type="checkbox"> Thực tập tại TT</div>
            </div>
            <div class="wk-cell" data-label="Thứ 3 - Sáng"></div>
            <div class="wk-cell" data-label="Thứ 4 - Sáng"></div>
            <div class="wk-cell" data-label="Thứ 5 - Sáng"></div>
            <div class="wk-cell" data-label="Thứ 6 - Sáng"></div>
            <div class="wk-cell" data-label="Thứ 7 - Sáng">
                <div class="task-card done"><input type="checkbox" checked> Căn chỉnh báo cáo</div>
            </div>
            <div class="wk-cell" data-label="CN - Sáng"></div>

            </div>
    </div>

    <div id="daily" class="tab-content">
        <h2 style="margin-bottom: 15px; color: var(--accent);">Danh sách cần làm (To-do)</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" placeholder="Thêm việc mới..." style="flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
            <button style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Thêm</button>
        </div>
        <div>
            <div class="task-card" style="font-size: 14px; padding: 10px; margin-bottom: 10px;"><input type="checkbox"> Sắp xếp lịch trực tháng mới</div>
            <div class="task-card" style="font-size: 14px; padding: 10px; margin-bottom: 10px;"><input type="checkbox"> Chuẩn bị kẽm nhung và ruy băng</div>
        </div>
    </div>

    <script>
        // JS Xử lý chuyển Tab mượt mà
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
