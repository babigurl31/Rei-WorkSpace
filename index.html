<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei 🌸</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nhat_ky.css">
</head>
<body>

    <div class="header">
        <h1>Quỳnh Nghi Workspace <span class="secret-flower" id="secretTrigger" title="Chỉ là bông hoa thôi... đúng không?">🌸</span></h1>
        <div class="clock-box" id="vnClock">Đang tải giờ...</div>
    </div>

    <div class="main-layout">
        
        <div class="sidebar-left">
            <div class="widget">
                <img src="anh-timer.png" alt="Avatar Timer" class="widget-avatar">
                <div class="widget-title">⏳ Trạm Tập Trung</div>
                
                <div class="timer-setting">
                    Tập trung: <input type="number" id="timerInput" value="20" min="1"> phút
                </div>
                <div class="timer-display" id="timerDisplay">20:00</div>
                <div class="timer-controls">
                    <button class="timer-btn" id="startTimerBtn" onclick="toggleTimer()">Bắt đầu</button>
                    <button class="timer-btn stop" onclick="resetTimer()">Bỏ cuộc</button>
                </div>
                <div class="widget-hint">Mỗi 20 phút tập trung = 1 bông hoa 🌸</div>
                <div class="flower-garden" id="flowerGarden"></div>
            </div>
        </div>

        <div class="content-center">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('daily')">Việc Hôm Nay</button>
                <button class="tab-btn" onclick="switchTab('weekly')">Kế Hoạch Tuần</button>
                <button class="tab-btn" onclick="switchTab('monthly')">Lịch Quan Trọng</button>
            </div>

            <div id="daily" class="tab-content active">
                <div class="input-row">
                    <input type="text" id="dailyInput" class="input-item" placeholder="Hôm nay cần làm gì Babi ơi?">
                    <input type="time" id="dailyTime" class="input-time">
                    <select id="dailyPrio" class="input-prio">
                        <option value="high">🔴 Hoàn thành trong thời gian quy định</option><option value="medium" selected>🟡 Hoàn thành trong 12 tiếng</option><option value="low">🔵 Hoàn thành trong ngày</option>
                    </select>
                    <button class="btn-add-main" onclick="addDaily()">Thêm</button>
                </div>
                <div id="dailyList"></div>
                <div class="history-section">
                    <button class="history-btn" onclick="toggleHistory()">👁️ Xem / Ẩn lịch sử đã xóa</button>
                    <div id="historyList" class="history-list"></div>
                </div>
            </div>

            <div id="weekly" class="tab-content"><div class="weekly-grid" id="weekGrid"></div></div>
            <div id="monthly" class="tab-content">
                <div class="cal-nav">
                    <button onclick="prevMonth()">◀ Trước</button>
                    <h3 id="monthYearDisplay" style="color: var(--accent); margin: 0 20px;">Tháng ...</h3>
                    <button onclick="nextMonth()">Sau ▶</button>
                </div>
                <div class="calendar-grid" id="calGrid"></div>
            </div>
        </div>

        <div class="sidebar-right">
            
            <div class="widget">
                <img src="anh-idea.png" alt="Avatar Idea" class="widget-avatar">
                <div class="widget-title">💡 Kho Ý Tưởng Nhỏ</div>
                <div class="mini-input-group">
                    <input type="text" id="ideaInput" placeholder=" ">
                    <button onclick="addIdea()">Lưu</button>
                </div>
                <ul class="mini-list" id="ideaList"></ul>
            </div>

            <div class="widget">
                <div class="widget-title">🛒 Checklist!</div>
                <div class="widget-hint">Ghi đồ cần mua vào đây để không quên nhé</div>
                <div class="mini-input-group">
                    <input type="text" id="shopInput" placeholder=" ">
                    <button onclick="addShop()">Thêm</button>
                </div>
                <ul class="mini-list" id="shopList"></ul>
            </div>

        </div>
    </div>

    <div id="wkModal" class="modal-overlay">...</div>

    <script src="script.js"></script>
    <script src="timer.js"></script>
    <script src="idea.js"></script>
    <script src="shop.js"></script>
    <script src="nhat_ky.js"></script>

</body>
</html>
